<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora PRO - Stevenca24</title>
  <style>
/* --- ESTILOS --- */
body{margin:0;font-family:Arial, sans-serif;background:#020617;color:white;}
header{padding:15px;text-align:center;font-weight:bold;background:#0f172a;border-bottom: 1px solid #1e293b;}
.app{padding:15px;max-width: 500px;margin: 0 auto;}

/* --- CALCULADORA --- */
.botones{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
.btn{padding:12px;border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer;}
.v{background:#3b82f6;} .p{background:#22c55e;} .b{background:#a855f7;}
.card{background:#0f172a;padding:15px;border-radius:15px;margin-bottom:15px;border: 1px solid #1e293b;}
.header-card{margin-bottom:10px;font-weight:bold;color:#3b82f6;}
input, textarea{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none;background:#020617;color:white;box-sizing: border-box;}
.buttons{display:flex;gap:10px;margin-top:10px;}
.calc{background:#3b82f6; flex:2;} .del{background:#ef4444; flex:1;}
.resultado{margin-top:10px;background:#0b1120;padding:12px;border-radius:10px;font-size:14px;line-height:1.6;}
.total{background:#111827;padding:15px;border-radius:15px;margin-top:20px;border: 1px dashed #3b82f6;}
</style>
 </head>
 <body>
  <div id="contenido-app">
   <header>⚡ Calculadora PRO Stevenca24</header>
   <div class="app">
    <div class="botones">
     <button class="btn v" onclick="agregar('v2')">🪟 Ventana 2H</button>
     <button class="btn v" onclick="agregar('v3')">🪟 Ventana 3H</button>
     <button class="btn v" onclick="agregar('v4')">🪟 Ventana 4H</button>
     <button class="btn p" onclick="agregar('puerta')">🚪 Puerta</button>
     <button class="btn b" onclick="agregar('bano')">🚿 Cortina Baño</button>
    </div>
    <div id="lista"></div>
    <div class="total" id="totales">
     <b>📊 Totales:</b>
     <br>
     <span id="t-riel">Riel: 0</span>
     <br>
     <span id="t-jamba">Jamba: 0</span>
     <br>
     <span id="t-vert">Vertical: 0</span>
     <br>
     <span id="t-horiz">Horizontal: 0</span>
     <br>
     <span id="t-vidrio">Vidrio: 0</span>
     <br>
     <span id="t-tual">Toallero: 0</span>
     <br>
     <span id="t-ptual">Porta Toallero: 0</span>
    </div>
    <button class="btn del" style="width:100%;margin-top:20px" onclick="location.reload()">Limpiar Todo</button>
   </div>
  <script>
let contador=0;
let totales={riel:0,jamba:0,vertical:0,horizontal:0,vidrio:0,tuallero:0,portaTuallero:0};

const r = n => isNaN(n) ? 0 : Number(n.toFixed(2));

function agregar(tipo){
    contador++;
    const titulos = {v2:"Ventana 2H", v3:"Ventana 3H", v4:"Ventana 4H", puerta:"Puerta", bano:"Cortina de Baño"};
    let html = `
    <div class="card" id="card${contador}">
        <div class="header-card">${titulos[tipo]} (#${contador})</div>
        <input type="number" id="ancho${contador}" placeholder="Ancho (cm)">
        <input type="number" id="alto${contador}" placeholder="Alto (cm)">
        <textarea id="multi${contador}" placeholder="O varias: 100x120\n80x90"></textarea>
        <div class="buttons">
            <button class="btn calc" onclick="calcular('${tipo}',${contador})">Calcular</button>
            <button class="btn del" onclick="eliminar(${contador})">Eliminar</button>
        </div>
        <div class="resultado" id="res${contador}"></div>
        <button class="btn" style="background:#25D366;width:100%;margin-top:10px" onclick="whatsapp(${contador})">📲 WhatsApp</button>
    </div>`;
    document.getElementById("lista").insertAdjacentHTML("afterbegin", html);
}

function operar(tipo, a, h, sumar){
    let add = (k, v) => { if(sumar) totales[k]+=v; return r(v); };
    let res = "";

    if(tipo.startsWith("v")){
        let div = tipo=="v2"?2 : (tipo=="v3"?3 : 4);
        res = `Riel: ${add("riel",a)}<br>
               Jamba: ${add("jamba",h-0.8)}<br>
               Vertical: ${add("vertical",h-2.7)}<br>
               Horizontal: ${add("horizontal",(a-11)/div)}<br>
               Malla: ${r(h-2.5)} x ${r((a-4.4)/div)}<br>
               Vidrio: ${add("vidrio",h-9)} x ${add("vidrio",(a-8.4)/div)}`;
    } else if(tipo=="puerta"){
        res = `Marco Alto: ${add("jamba",h-1)}<br>Marco Ancho: ${add("riel",a)}<br>
               Hoja Alto: ${add("vidrio",h-5)}<br>Hoja Ancho: ${add("vidrio",a-6)}`;
    } else if(tipo=="bano"){
        res = `Riel Sup: ${add("riel",a)}<br>Riel Inf: ${add("riel",a-0.5)}<br>
               Jamba: ${add("jamba",h-4.4)}<br>Vertical: ${add("vertical",h-6)}<br>
               Horizontal: ${add("horizontal",(a+6)/2)}<br>
               Toallero: ${add("tuallero",(a-12)/2)}<br>
               Porta Toallero: ${add("portaTuallero",10)}`;
    }
    return res;
}

function calcular(tipo, id){
    const m = document.getElementById("multi"+id).value.trim();
    const a = parseFloat(document.getElementById("ancho"+id).value);
    const h = parseFloat(document.getElementById("alto"+id).value);
    let final = "";
    
    totales={riel:0,jamba:0,vertical:0,horizontal:0,vidrio:0,tuallero:0,portaTuallero:0};

    if(m){
        m.split("\n").forEach((l, i) => {
            let p = l.split("x");
            if(p.length==2) final += `<b>#${i+1}:</b><br>${operar(tipo, parseFloat(p[0]), parseFloat(p[1]), true)}<hr>`;
        });
    } else if(a && h){
        final = operar(tipo, a, h, true);
    }
    
    document.getElementById("res"+id).innerHTML = final;
    mostrarTotales();
}

function mostrarTotales(){
    document.getElementById("t-riel").innerText = "Riel: " + r(totales.riel);
    document.getElementById("t-jamba").innerText = "Jamba: " + r(totales.jamba);
    document.getElementById("t-vert").innerText = "Vertical: " + r(totales.vertical);
    document.getElementById("t-horiz").innerText = "Horizontal: " + r(totales.horizontal);
    document.getElementById("t-vidrio").innerText = "Vidrio: " + r(totales.vidrio);
    document.getElementById("t-tual").innerText = "Toallero: " + r(totales.tuallero);
    document.getElementById("t-ptual").innerText = "Porta Toallero: " + r(totales.portaTuallero);
}

function eliminar(id){ document.getElementById("card"+id).remove(); }

function whatsapp(id){
    let t = document.getElementById("res"+id).innerText;
    window.open("https://wa.me/?text="+encodeURIComponent("📋 Cálculo Stevenca24:\n"+t), "_blank");
}
</script>
 </body>
</html>
